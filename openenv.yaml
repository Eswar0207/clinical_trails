name: ClinicalTrialEnv
slug: clinical-trial-env
version: 0.1.0
description: >
  OpenEnv-style emergency-room triage benchmark with deterministic graders,
  typed models, and three difficulty-tiered tasks.
entrypoint: app:app
benchmark: clinical_trial_env
tool:
  type: function
  function:
    name: clinical_trial_env
    description: >
      Evaluate emergency-room triage decisions through a two-step investigation
      and final triage workflow with deterministic scoring.
tags:
  - openenv
  - healthcare
  - triage
  - evaluation
tasks:
  - id: appendicitis_easy
    name: Appendicitis Triage
    description: Evaluate safe triage for suspected appendicitis.
    difficulty: easy
    max_steps: 2
    reward_range: [0.0, 1.0]
    grader:
      type: deterministic
      enabled: true
  - id: stroke_alert_medium
    name: Stroke Alert Triage
    description: Evaluate urgent stroke routing and immediate actions.
    difficulty: medium
    max_steps: 2
    reward_range: [0.0, 1.0]
    grader:
      type: deterministic
      enabled: true
  - id: septic_shock_hard
    name: Septic Shock Triage
    description: Evaluate ICU-level sepsis escalation decisions.
    difficulty: hard
    max_steps: 2
    reward_range: [0.0, 1.0]
    grader:
      type: deterministic
      enabled: true
api:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
